# 安装后复制到 /opt/qdgz300_backend/config/receiver.yaml 并按现场环境修改

network:
  listen_port: 9999
  bind_ips:
    - "192.168.1.101"
    - "192.168.2.101"
    - "192.168.3.101"
  recvmmsg_batch_size: 64
  socket_rcvbuf_mb: 256
  enable_ip_freebind: true
  source_id_map: [0x11, 0x12, 0x13]
  cpu_affinity_map: [16, 17, 18]
  source_filter_enabled: true
  numa_node: 1

reassembly:
  timeout_ms: 100
  max_contexts: 1024
  max_total_frags: 1024
  max_reasm_bytes_per_key: 16777216

reorder:
  window_size: 512
  timeout_ms: 50

queue:
  rawcpi_q_capacity: 64
  rawcpi_q_slot_size_mb: 2

logging:
  level: "INFO"

consumer:
  print_summary: true
  write_to_file: false
  output_dir: "/opt/qdgz300_backend/data/rawblocks"
  stats_interval_ms: 1000

capture:
  enabled: false
  spool_dir: "/opt/qdgz300_backend/spool/receiver"
  archive_dir: "/data/qdgz300/receiver"
  archive_max_files: 256
  archive_max_age_days: 7
  max_file_size_mb: 1024
  max_files: 8
  filter_packet_types: ["0x03", "0x04"]
  filter_source_ids: []

performance:
  prefetch_hints_enabled: true
  qos_enabled: true
  heartbeat_max_queue_depth: 1000
