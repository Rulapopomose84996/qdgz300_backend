logging:
  level: info
  sink: stdout
runtime:
  tick_interval_ms: 500
  heartbeat_interval_sec: 2

network:
  listen_port: 9999
  bind_ip: "0.0.0.0"
  interface: ""
  local_device_id: 0x01
  recv_threads: 8
  recvmmsg_batch_size: 64
  socket_rcvbuf_mb: 256
  enable_so_reuseport: true

reassembly:
  timeout_ms: 100
  max_contexts: 1024
  max_total_frags: 1024
  sample_count_fixed: 4096
  max_reasm_bytes_per_key: 16777216

reorder:
  window_size: 512
  timeout_ms: 50
  enable_zero_fill: true

timestamp:
  apply_window_ms: 5
  enable_check: true
  allow_unlocked_clock: true

flow_control:
  max_buffer_size: 1024
  high_watermark: 800
  low_watermark: 200
  policy: "DROP_OLDEST"

monitoring:
  metrics_port: 8080
  metrics_bind_ip: "0.0.0.0"

delivery:
  method: "callback"
  shm_name: "/receiver_shm"
  shm_size_mb: 64
  socket_path: "/tmp/tower_receiver.sock"
  reconnect_interval_ms: 100
